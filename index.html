<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stay Tuned</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #d0e9f1, #d0e9f1);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            color: #fff;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 48px;
            color: black;
            font-weight: 700;
            margin-bottom: 20px;
        }
        p {
            font-size: 20px;
            color: black;
            margin: 10px 0;
        }
        .time {
            font-size: 28px;
            color: #ff6f61;
            font-weight: 800;
            background-color: black;
            padding: 5px 15px;
            border-radius: 10px;
        }
        .message {
            font-size: 24px;
            font-weight: bold;
            color: red;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }
        .stay-tuned {
            font-size: 30px;
            font-weight: 600;
            color: #009688;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }
        .highlight {
            color: black;
            font-weight: 700;
        }
        .logo {
            max-width: 200px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://www.ezhuthupizhai.com/assets/images/logo.png" alt="Ezhuthupizhai Logo" class="logo">
        <h1>🎉 We're Going Live! 🎉</h1>
        <p class="message">Join us at <span class="time" id="timer">12:00 AM</span> <span class="highlight">for an exciting experience!</span></p>
        <p class="stay-tuned">Stay Tuned! 🚀</p>
    </div>

    <script>
        function updateCountdown() {
            const countdownDate = new Date();
            countdownDate.setHours(24, 0, 0, 0);  // Set to 12:00 AM today (or tomorrow if past midnight)
            
            const now = new Date().getTime();
            const distance = countdownDate - now;
            
            if (distance < 0) {
                // If the countdown is already over
                document.getElementById("timer").innerHTML = "LIVE NOW!";
                return;
            }
            
            // Time calculations
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            document.getElementById("timer").innerHTML = `${hours}h ${minutes}m ${seconds}s`;
        }
        
        // Update the countdown every second
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
